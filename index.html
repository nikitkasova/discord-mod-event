<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ролевой Генератор: Бункер & Мафия | Jackbox Колесо Игр</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a3c2c 0%, #0e2a1f 100%);
            font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
            padding: 24px 16px;
            min-height: 100vh;
            color: #f0f2e9;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ГЛАВНЫЕ КНОПКИ РЕЖИМОВ + JACKBOX */
        .mode-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            font-size: 1.6rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
            background: #2d2b26;
            color: #ccc;
            letter-spacing: 2px;
        }

        .mode-btn.active {
            background: #d6a15a;
            color: #1f2a1b;
            box-shadow: 0 4px 0 #6b3f00;
            transform: translateY(2px);
        }

        .jackbox-btn {
            background: #b83b2e;
            color: #ffe7b0;
            box-shadow: 0 6px 0 #6a1e12;
            font-size: 1.6rem;
            padding: 10px 28px;
        }

        .jackbox-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #6a1e12;
        }

        /* КОЛЕСО БАРАБАНА */
        .wheel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            font-family: monospace;
        }
        .wheel-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .wheel-container {
            background: #261f16;
            border-radius: 64px;
            padding: 30px 20px 40px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 30px 40px black;
            border: 3px solid #f5c27b;
        }
        canvas {
            background: #2c241a;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 0 8px #4a3724, 0 0 0 14px #e0aa6e;
            cursor: pointer;
            transition: 0.1s;
        }
        canvas:active {
            transform: scale(0.98);
        }
        .wheel-title {
            font-size: 1.7rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffda99;
            text-shadow: 2px 2px 0 #7a3e1a;
        }
        .spin-btn {
            background: #ffb347;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            margin-top: 25px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #9b4a0e;
            transition: 0.05s linear;
            color: #2c1a0e;
        }
        .spin-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9b4a0e;
        }
        .close-wheel {
            background: #5a3e2a;
            border: none;
            font-size: 1.2rem;
            margin-top: 16px;
            padding: 6px 24px;
            border-radius: 40px;
            color: #ffd49f;
            cursor: pointer;
        }
        .result-text {
            font-size: 1.4rem;
            margin-top: 20px;
            background: #00000099;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }

        .control-panel {
            background: #0f2a1ed9;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px 28px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            border: 1px solid #b5a56e;
            box-shadow: 0 12px 28px black;
        }

        .players-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .players-input label {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #fbd26a;
        }

        .players-input input {
            font-size: 1.6rem;
            width: 120px;
            padding: 8px 12px;
            text-align: center;
            background: #2e2a24;
            border: 2px solid #c2a15b;
            border-radius: 40px;
            color: #ffeaac;
            font-weight: bold;
            font-family: monospace;
        }

        .generate-btn {
            background: #c97e2a;
            border: none;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 10px 36px;
            border-radius: 60px;
            color: #1e2b16;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #6a3e12;
        }

        .generate-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #6a3e12;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-top: 20px;
        }

        .character-card {
            background: #fef7e0;
            background-image: radial-gradient(circle at 10% 20%, rgba(210, 180, 110, 0.15) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 32px;
            padding: 20px 18px;
            box-shadow: 0 18px 28px -8px black;
            border: 1px solid #e9cf8b;
            transition: all 0.2s;
            color: #2d2418;
            font-family: 'Segoe UI', system-ui;
        }

        .mafia-card {
            background: linear-gradient(145deg, #2a1c1e, #1f1216);
            border: 2px solid #b56576;
            color: #f7e3af;
        }
        .mafia-card .character-header {
            border-left-color: #e56b6f;
            color: #f4acb7;
            background: none;
            -webkit-background-clip: unset;
            text-shadow: none;
        }
        .mafia-card .prop-label {
            color: #e28b8f;
        }
        .mafia-card .prop-value {
            color: #f8f3dc;
        }
        .character-header {
            font-size: 1.8rem;
            font-weight: 800;
            border-left: 8px solid #b87333;
            padding-left: 16px;
            margin-bottom: 20px;
        }
        .char-property {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #c0a86a;
        }
        .prop-label {
            font-weight: 800;
            width: 125px;
            flex-shrink: 0;
            color: #8b5a2b;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .prop-value {
            flex: 1;
            font-weight: 500;
            color: #2e241b;
            font-size: 1rem;
        }
        .stats-banner {
            margin-top: 24px;
            background: #1e2a1faa;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px 24px;
            text-align: center;
            font-weight: bold;
        }
        .footer-warning {
            text-align: center;
            margin-top: 40px;
            color: #bfc9b0;
            font-size: 0.85rem;
        }
        @media (max-width: 700px) {
            .mode-btn, .jackbox-btn { font-size: 1.2rem; padding: 6px 16px; }
            .prop-label { width: 100px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="mode-bar">
        <button id="bunkerBtn" class="mode-btn active">🏚️ БУНКЕР</button>
        <button id="mafiaBtn" class="mode-btn">🔫 МАФИЯ</button>
        <button id="jackboxBtn" class="mode-btn jackbox-btn">🎲 JACKBOX 🎲</button>
    </div>

    <div class="control-panel">
        <div class="players-input">
            <label>👥 КОЛИЧЕСТВО ИГРОКОВ:</label>
            <input type="number" id="playersCount" min="4" max="18" value="10" step="1">
            <div style="font-size:0.7rem">от 4 до 18</div>
        </div>
        <button id="generateMainBtn" class="generate-btn">✨ ГЕНЕРИРОВАТЬ ✨</button>
    </div>

    <div id="cardsContainer" class="cards-grid"></div>
    <div class="footer-warning">
        🎡 Jackbox Колесо: выбери игру случайным образом! <br>
        💀 Мафия 10+ : Смерть, Вор, Дон, Маньяк. Бункер — полная генерация личностей.
    </div>
</div>

<!-- Барабан / Колесо Jackbox -->
<div id="wheelModal" class="wheel-overlay">
    <div class="wheel-container">
        <div class="wheel-title">🎡 JACKBOX КОЛЕСО 🎡</div>
        <canvas id="wheelCanvas" width="450" height="450" style="width:100%; max-width:450px; height:auto; aspect-ratio:1/1"></canvas>
        <div>
            <button id="spinWheelBtn" class="spin-btn">🌀 КРУТИТЬ 🌀</button>
        </div>
        <div id="wheelResult" class="result-text">Нажми на колесо или кнопку</div>
        <button id="closeWheelBtn" class="close-wheel">✖ Закрыть</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. БУНКЕР: полная база
    // --------------------------------------------------------------
    const professions = [
        "Хирург", "Повар", "Инженер-механик", "Электрик", "Сантехник", "Агроном", "Ветеринар", "Психолог",
        "Пожарный", "Полицейский", "Военный", "Строитель", "Учитель физики", "Биолог", "Геолог", "Шахтёр",
        "Водитель грузовика", "Моряк", "Лётчик", "IT-специалист", "Хакер", "Юрист", "Бармен", "Музыкант",
        "Художник", "Фотограф", "Журналист", "Фермер", "Охотник", "Рыбак", "Кузнец", "Сварщик", "Стоматолог",
        "Фармацевт", "Сапёр", "Разведчик", "Тренер по выживанию", "Метеоролог", "Археолог", "Клоун", "Священник"
    ];
    const genders = ["Мужской", "Женский"];
    const getAge = () => Math.floor(Math.random() * 81) + 20;
    const bodyTypes = ["Худощавое", "Атлетичное", "Крепкое", "Полноватое", "Мускулистое", "Низкорослое (153 см)",
        "Высокое (190 см)", "Очень высокое (2 м)", "Сутулое", "Жилистое", "Коренастое", "Изящное",
        "Массивное", "С широкими плечами", "Хрупкое телосложение", "Среднее телосложение"];
    const healthIssues = ["Здоров абсолютно", "Язва желудка", "Астма", "Диабет 2 типа", "Аллергия на пыльцу", "Мигрень",
        "Гипертония", "Артрит", "Близорукость", "Плохое зрение", "Сердечная недостаточность", "Хронический бронхит",
        "Псориаз", "Панические атаки", "Бессонница", "Склонность к переломам", "Слабая иммунная система", "Гастрит"];
    const hobbies = ["Боевые искусства", "Игра на гитаре", "Шахматы", "Альпинизм", "Плавание", "Бег", "Чтение классики",
        "Выживание в дикой природе", "Кулинария", "Садоводство", "Пчеловодство", "Рыбалка", "Охота", "Стрельба",
        "Паркур", "Танцы", "Каллиграфия", "Астрономия", "Медитация", "Рукоделие", "Ремонт авто", "Йога"];
    const phobias = ["Энтомофобия (боязнь насекомых)", "Арахнофобия (пауки)", "Клаустрофобия (замкнутое пространство)",
        "Акрофобия (высота)", "Никтофобия (темнота)", "Гемофобия (кровь)", "Танатофобия (смерть)", "Агорафобия",
        "Социофобия", "Дентофобия", "Кинофобия (собаки)", "Офидиофобия (змеи)", "Трипофобия", "Астрапофобия (гроза)"];
    const inventory = ["Упаковка антибиотиков (Раскрыта)", "Фонарик (сели батарейки)", "Нож выживания", "Аптечка с бинтами",
        "Зажигалка и сухой спирт", "Свисток", "Карта местности", "Пара носков", "Консервная банка тушёнки",
        "Пластиковая бутылка воды", "Заряженный пауэрбанк", "Книга 'Как выжить в бункере'", "Противогаз (фильтр старый)",
        "Топор", "Моток верёвки 15м", "Компас", "Рюкзак с семенами", "Бинокль", "Рация (слабая батарея)"];
    const facts = ["Пишет стихи (Раскрыта)", "Был чемпионом по борьбе", "Имеет двойное гражданство", "Знает 5 языков",
        "В прошлом сидел в тюрьме", "Выиграл в лотерею миллион", "Скрывается от коллекторов", "Талантливый повар",
        "Страдает лунатизмом", "Сделал тату на всё лицо", "Когда-то спас утопающего", "Работал в цирке",
        "Владеет секретной информацией", "Обожает азартные игры", "Был в секте", "Изучал ядерную физику"];
    const specialAbilities = [
        "Игрок не может голосовать в ближайшем голосовании. Игрок может быть изгнан только единогласно.",
        "В критический момент может восстановить здоровье любому игроку (1 раз).",
        "Может тайно подсмотреть профессию одного игрока.",
        "При голосовании его голос считается за два.",
        "Иммунитет к первому исключению.",
        "Может один раз обменять свой инвентарь с другим игроком.",
        "Знает секретный код от оружейной комнаты (получит пистолет).",
        "Может потребовать переголосования один раз за игру.",
        "Никто не может узнать его возраст и факт (тайна личности)."
    ];
    const randomElem = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const generateBunkerChar = (index) => ({
        id: index, profession: randomElem(professions), gender: randomElem(genders), age: getAge(),
        body: randomElem(bodyTypes), health: randomElem(healthIssues), hobby: randomElem(hobbies),
        phobia: randomElem(phobias), inventory: randomElem(inventory), fact: randomElem(facts),
        special: randomElem(specialAbilities)
    });

    // --------------------------------------------------------------
    // 2. МАФИЯ: распределение (Смерть/Вор при 10+)
    // --------------------------------------------------------------
    function getMafiaRolesDistribution(playersCount) {
        let roles = [];
        if (playersCount < 8) roles = ["Мафия", "Мафия", "Доктор", "Комиссар"];
        else if (playersCount <= 9) roles = ["Мафия", "Мафия", "Доктор", "Комиссар"];
        else {
            roles = ["Мафия", "Мафия", "Дон мафии", "Доктор", "Комиссар", "Маньяк", "Смерть", "Вор"];
        }
        let remaining = playersCount - roles.length;
        for (let i = 0; i < remaining; i++) roles.push("Мирный житель");
        for (let i = roles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [roles[i], roles[j]] = [roles[j], roles[i]];
        }
        return roles;
    }
    function getRoleDescription(role) {
        switch(role) {
            case "Мафия": return "🩸 Каждую ночь убивает мирного. Чат мафии.";
            case "Дон мафии": return "👑 Проверяет роли, не может быть убит мафией.";
            case "Доктор": return "💊 Лечит игрока ночью, спасает от убийства.";
            case "Комиссар": return "🔍 Проверяет: мафия или мирный.";
            case "Маньяк": return "🔪 Одиночка, убивает каждую ночь, побеждает один.";
            case "Смерть": return "💀 При своей гибели забирает одного игрока с собой.";
            case "Вор": return "🎭 Крадёт способность цели (убить/вылечить/проверить) разово.";
            default: return "🌾 Мирный житель. Голосует днём.";
        }
    }
    function getRoleExtra(role) {
        if (role === "Вор") return "🎲 Один раз укради способность у любого: у мафии - убей, у доктора - вылечи.";
        if (role === "Смерть") return "⚰️ Пассивно: когда умираешь, выбери жертву - она умирает с тобой.";
        return "";
    }
    function generateMafiaCard(id, role) {
        return { id, role, roleDescription: getRoleDescription(role), extra: getRoleExtra(role), flavor: randomElem(["Таинственный взгляд", "Все боятся", "Двойная жизнь", "Загадочная улыбка"]) };
    }

    let currentMode = 'bunker';
    function renderBunker(cnt) {
        let players = []; for (let i=1;i<=cnt;i++) players.push(generateBunkerChar(i));
        let html = '';
        players.forEach(p => { html += `<div class="character-card"><div class="character-header">🧩 Игрок ${p.id}</div>
            <div class="char-property"><span class="prop-label">Профессия</span><span class="prop-value">${p.profession}</span></div>
            <div class="char-property"><span class="prop-label">Пол</span><span class="prop-value">${p.gender}</span></div>
            <div class="char-property"><span class="prop-label">Возраст</span><span class="prop-value">${p.age} лет</span></div>
            <div class="char-property"><span class="prop-label">Тело и рост</span><span class="prop-value">${p.body}</span></div>
            <div class="char-property"><span class="prop-label">Здоровье</span><span class="prop-value">${p.health}</span></div>
            <div class="char-property"><span class="prop-label">Хобби</span><span class="prop-value">${p.hobby}</span></div>
            <div class="char-property"><span class="prop-label">Фобия</span><span class="prop-value">${p.phobia}</span></div>
            <div class="char-property"><span class="prop-label">Инвентарь</span><span class="prop-value">${p.inventory}</span></div>
            <div class="char-property"><span class="prop-label">Факт</span><span class="prop-value">${p.fact}</span></div>
            <div class="char-property"><span class="prop-label">Спец. возможность</span><span class="prop-value">✨ ${p.special}</span></div>
        </div>`; });
        document.getElementById('cardsContainer').innerHTML = html;
        const oldStat = document.getElementById('mafia-stats'); if(oldStat) oldStat.remove();
    }
    function renderMafia(cnt) {
        const rolesArr = getMafiaRolesDistribution(cnt);
        let players = []; for(let i=0;i<cnt;i++) players.push(generateMafiaCard(i+1, rolesArr[i]));
        let html = '';
        players.forEach(p => {
            let icon = "🎭"; if(p.role==="Мафия") icon="🔪"; else if(p.role==="Дон мафии") icon="👑"; else if(p.role==="Доктор") icon="💊"; else if(p.role==="Комиссар") icon="🔍"; else if(p.role==="Маньяк") icon="🪦"; else if(p.role==="Смерть") icon="💀"; else if(p.role==="Вор") icon="🎭";
            let extraBlock = p.extra ? `<div class="char-property"><span class="prop-label">Механика</span><span class="prop-value">✨ ${p.extra}</span></div>` : '';
            html += `<div class="character-card mafia-card"><div class="character-header">${icon} Игрок ${p.id}</div>
                <div class="char-property"><span class="prop-label">Роль</span><span class="prop-value"><strong style="background:#3c2a2f; padding:2px 12px; border-radius:32px;">${p.role}</strong></span></div>
                <div class="char-property"><span class="prop-label">Способность</span><span class="prop-value">${p.roleDescription}</span></div>${extraBlock}
                <div class="char-property"><span class="prop-label">Особенность</span><span class="prop-value">${p.flavor}</span></div>
            </div>`;
        });
        document.getElementById('cardsContainer').innerHTML = html;
        let roleCounts = {}; rolesArr.forEach(r=>{ roleCounts[r]=(roleCounts[r]||0)+1; });
        let statDiv = document.getElementById('mafia-stats');
        if(!statDiv){ statDiv = document.createElement('div'); statDiv.id='mafia-stats'; statDiv.className='stats-banner'; document.getElementById('cardsContainer').parentNode.appendChild(statDiv); }
        let statText = `📜 Состав (${cnt} игроков): `; for(let [r,c] of Object.entries(roleCounts)) statText += `${r} — ${c}  `;
        statDiv.innerHTML = statText;
    }
    function generateByMode(){
        let cnt = parseInt(document.getElementById('playersCount').value,10);
        if(isNaN(cnt)) cnt=10; cnt = Math.min(18,Math.max(4,cnt));
        document.getElementById('playersCount').value=cnt;
        if(currentMode==='bunker') renderBunker(cnt);
        else renderMafia(cnt);
    }

    // --------------------------------------------------------------
    // 3. JACKBOX КОЛЕСО - 6 ИГР
    // --------------------------------------------------------------
    const JACKBOX_GAMES = [
        "🎮 ВЫЖИТЬ В ИНЕТЕ",
        "🍔 ВЫЖИТЬ В КАТЛЕТЕ",
        "👾 МОНСТР ИЩЕТ МОНСТА",
        "😂 СМЕХ ЛЫСТ 3",
        "🔊 ЗВУК СЛУХ",
        "🔫 МАФИЯ"
    ];
    const GAME_COLORS = [
        "#E67E22", "#2ECC71", "#E74C3C", "#F1C40F", "#3498DB", "#9B59B6"
    ];
    let wheelCanvas = null, ctx = null;
    let currentRotation = 0;
    let spinning = false;
    let animationId = null;
    let selectedGame = "";

    function drawWheel(rotationRad = 0) {
        if(!ctx) return;
        const w = wheelCanvas.width, h = wheelCanvas.height;
        const centerX = w/2, centerY = h/2, radius = w*0.45;
        ctx.clearRect(0,0,w,h);
        const angleStep = (Math.PI * 2) / JACKBOX_GAMES.length;
        for(let i=0;i<JACKBOX_GAMES.length;i++){
            const start = i * angleStep + rotationRad;
            const end = (i+1) * angleStep + rotationRad;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.fillStyle = GAME_COLORS[i % GAME_COLORS.length];
            ctx.fill();
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#2c1e12";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
            ctx.fillStyle = "#fff9e8";
            ctx.font = `bold ${Math.max(12, Math.floor(radius * 0.1))}px "Segoe UI"`;
            ctx.save();
            ctx.translate(centerX + Math.cos(start + angleStep/2) * radius * 0.7, centerY + Math.sin(start + angleStep/2) * radius * 0.7);
            ctx.rotate(start + angleStep/2 + Math.PI/2);
            let shortName = JACKBOX_GAMES[i].replace(/[^А-Яа-я0-9]/g,'').slice(0,8);
            if(JACKBOX_GAMES[i].length > 10) shortName = JACKBOX_GAMES[i].slice(0,10);
            ctx.fillText(shortName, -20, 6);
            ctx.restore();
        }
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius*0.12, 0, Math.PI*2);
        ctx.fillStyle = "#FFD966";
        ctx.fill();
        ctx.fillStyle = "#4A2A1A";
        ctx.font = "bold 24px monospace";
        ctx.fillText("?", centerX-10, centerY+8);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY-radius-8);
        ctx.lineTo(centerX-12, centerY-radius+12);
        ctx.lineTo(centerX+12, centerY-radius+12);
        ctx.fillStyle = "#E6B422";
        ctx.fill();
    }

    function getGameFromRotation(rotationRad){
        const angleStep = (Math.PI * 2) / JACKBOX_GAMES.length;
        let rawAngle = (Math.PI * 2 - (rotationRad % (Math.PI*2))) % (Math.PI*2);
        let idx = Math.floor(rawAngle / angleStep) % JACKBOX_GAMES.length;
        return JACKBOX_GAMES[idx];
    }

    function spinWheel() {
        if(spinning) return;
        spinning = true;
        const startRot = currentRotation;
        const spins = Math.random() * 8 + 8; 
        const targetDelta = (Math.random() * Math.PI * 2) + spins * Math.PI * 2;
        const targetRotation = startRot + targetDelta;
        const duration = 1800;
        const startTime = performance.now();
        function animateSpin(now){
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed/duration);
            const easeOut = 1 - Math.pow(1-t, 3);
            const newRot = startRot + targetDelta * easeOut;
            currentRotation = newRot;
            drawWheel(currentRotation);
            if(t<1){
                requestAnimationFrame(animateSpin);
            } else {
                currentRotation = targetRotation;
                drawWheel(currentRotation);
                const finalGame = getGameFromRotation(currentRotation);
                selectedGame = finalGame;
                document.getElementById('wheelResult').innerHTML = `🎉 ВЫБРАНО: ${finalGame} 🎉`;
                spinning = false;
                setTimeout(()=>{
                    if(confirm(`🎲 Игра определена: ${finalGame}\nХотите перейти в режим ${finalGame.includes("МАФИЯ") ? "МАФИИ" : "БУНКЕРА (по умолчанию)"}?`)){
                        if(finalGame.includes("МАФИЯ")){
                            currentMode = 'mafia';
                            bunkerBtn.classList.remove('active');
                            mafiaBtn.classList.add('active');
                            generateByMode();
                        } else {
                            currentMode = 'bunker';
                            mafiaBtn.classList.remove('active');
                            bunkerBtn.classList.add('active');
                            generateByMode();
                        }
                    }
                }, 80);
            }
        }
        requestAnimationFrame(animateSpin);
    }

    function openWheel(){
        const modal = document.getElementById('wheelModal');
        modal.classList.add('active');
        if(!wheelCanvas){
            wheelCanvas = document.getElementById('wheelCanvas');
            ctx = wheelCanvas.getContext('2d');
            drawWheel(currentRotation);
        } else {
            drawWheel(currentRotation);
        }
        document.getElementById('wheelResult').innerHTML = "Нажми КРУТИТЬ!";
        selectedGame = "";
    }
    function closeWheel(){
        document.getElementById('wheelModal').classList.remove('active');
        if(spinning){
            spinning = false;
            if(animationId) cancelAnimationFrame(animationId);
        }
    }
    
    // инициализация DOM
    const bunkerBtn = document.getElementById('bunkerBtn');
    const mafiaBtn = document.getElementById('mafiaBtn');
    const jackBtn = document.getElementById('jackboxBtn');
    const generateBtn = document.getElementById('generateMainBtn');
    function setMode(mode){
        currentMode = mode;
        if(mode==='bunker'){ bunkerBtn.classList.add('active'); mafiaBtn.classList.remove('active'); }
        else { mafiaBtn.classList.add('active'); bunkerBtn.classList.remove('active'); }
        generateByMode();
    }
    bunkerBtn.onclick = ()=>setMode('bunker');
    mafiaBtn.onclick = ()=>setMode('mafia');
    generateBtn.onclick = ()=>generateByMode();
    jackBtn.onclick = ()=>openWheel();
    document.getElementById('spinWheelBtn').onclick = ()=>{ if(!spinning) spinWheel(); };
    document.getElementById('closeWheelBtn').onclick = closeWheel;
    wheelCanvas?.addEventListener('click', ()=>{ if(!spinning) spinWheel(); });
    
    // старт с 10 игроками и мафией для демо
    document.getElementById('playersCount').value = 10;
    setMode('mafia');
</script>
</body>
</html>
